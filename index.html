<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재고 현황</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic",
                 "맑은 고딕", sans-serif;
    background: #f1f5f9;
    color: #1e293b;
    -webkit-text-size-adjust: 100%;
  }
  header {
    background: #1e293b;
    color: #f8fafc;
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { margin: 0; font-size: 1.2rem; }
  header .ts { font-size: 0.8rem; opacity: 0.7; margin-top: 4px; }
  nav {
    display: flex;
    background: #334155;
    position: sticky;
    top: 62px;
    z-index: 9;
  }
  nav button {
    flex: 1;
    background: none;
    border: none;
    color: #cbd5e1;
    padding: 14px 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 3px solid transparent;
  }
  nav button.active {
    color: #f8fafc;
    border-bottom-color: #60a5fa;
  }
  main { padding: 16px; max-width: 960px; margin: 0 auto; }
  section { display: none; }
  section.active { display: block; }
  .search-box {
    width: 100%;
    padding: 12px 14px;
    font-size: 1rem;
    border: 2px solid #cbd5e1;
    border-radius: 8px;
    margin-bottom: 16px;
    background: white;
    -webkit-appearance: none;
    appearance: none;
  }
  .search-box:focus { outline: none; border-color: #60a5fa; }
  .stock-group { margin-bottom: 4px; }
  .stock-group.hidden { display: none; }
  .no-result {
    padding: 24px;
    text-align: center;
    color: #94a3b8;
    background: white;
    border-radius: 8px;
    display: none;
  }
  .no-result.visible { display: block; }
  h2 {
    font-size: 1rem;
    margin: 20px 0 8px;
    color: #475569;
    border-left: 4px solid #60a5fa;
    padding-left: 8px;
  }
  h2:first-child { margin-top: 0; }
  .stock-group:first-child h2 { margin-top: 0; }
  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    font-size: 0.9rem;
  }
  th, td {
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid #e2e8f0;
  }
  th {
    background: #e2e8f0;
    font-weight: 600;
    font-size: 0.85rem;
    color: #475569;
  }
  tr:last-child td { border-bottom: none; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .empty {
    padding: 20px;
    text-align: center;
    color: #94a3b8;
    background: white;
    border-radius: 8px;
  }
  .po-card {
    background: white;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 12px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .po-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid #e2e8f0;
  }
  .po-customer { font-weight: 700; font-size: 1rem; }
  .po-date { color: #64748b; font-size: 0.85rem; }
  .po-memo { color: #64748b; font-size: 0.8rem; margin-top: 4px; }
  .po-line {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 0.9rem;
  }
  .po-line.shipped { color: #94a3b8; text-decoration: line-through; }
  .po-line .badge {
    display: inline-block;
    font-size: 0.7rem;
    padding: 1px 6px;
    border-radius: 10px;
    margin-left: 6px;
    background: #dcfce7;
    color: #166534;
  }
  @media (max-width: 600px) {
    nav { top: 62px; }
    th, td { padding: 8px 6px; font-size: 0.85rem; }
    h1 { font-size: 1.05rem; }
  }
</style>
</head>
<body>
<header>
  <h1>재고 현황</h1>
  <div class="ts">마지막 업데이트: 2026-04-13 19:53:50</div>
</header>
<nav>
  <button class="tab-btn active" data-tab="stock">재고</button>
  <button class="tab-btn" data-tab="po">발주서</button>
</nav>
<main>
  <section id="stock" class="active">
    <input type="search" class="search-box" id="stock-search"
           placeholder="품목 / 색상 / 코일번호 검색…" autocomplete="off">
    <div class="stock-group"><h2>완제품</h2><table><thead><tr><th>품목</th><th>색상</th><th>재고</th></tr></thead><tbody><tr><td>전통앤드캡</td><td>검정매트</td><td class='num'>1</td></tr></tbody></table></div>
    <div class="stock-group"><h2>반제품</h2><div class="empty">데이터 없음</div></div>
    <div class="stock-group"><h2>공정품</h2><table><thead><tr><th>품목</th><th>색상</th><th>재고</th></tr></thead><tbody><tr><td>전통앤드캡</td><td>검정매트</td><td class='num' style='color:#dc2626;font-weight:600;'>-1</td></tr></tbody></table></div>
    <div class="stock-group"><h2>코일</h2><div class="empty">데이터 없음</div></div>
    <div class="no-result" id="stock-no-result">검색 결과 없음</div>
  </section>
  <section id="po">
    <input type="search" class="search-box" id="po-search"
           placeholder="업체 / 품목 / 색상 / 메모 검색…" autocomplete="off">
    <div id="po-list"><div class="empty">발주서 없음</div></div>
    <div class="no-result" id="po-no-result">검색 결과 없음</div>
  </section>
</main>
<script>
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var tab = btn.getAttribute('data-tab');
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b === btn);
      });
      document.querySelectorAll('main section').forEach(function(s) {
        s.classList.toggle('active', s.id === tab);
      });
    });
  });

  function filterStock() {
    var q = document.getElementById('stock-search').value.trim().toLowerCase();
    var anyVisible = false;
    document.querySelectorAll('#stock .stock-group').forEach(function(group) {
      var rows = group.querySelectorAll('tbody tr');
      var groupVisible = false;
      rows.forEach(function(tr) {
        var match = !q || tr.textContent.toLowerCase().indexOf(q) >= 0;
        tr.style.display = match ? '' : 'none';
        if (match) groupVisible = true;
      });
      group.classList.toggle('hidden', rows.length > 0 && !groupVisible);
      if (groupVisible) anyVisible = true;
    });
    document.getElementById('stock-no-result')
      .classList.toggle('visible', !!q && !anyVisible);
  }

  function filterPo() {
    var q = document.getElementById('po-search').value.trim().toLowerCase();
    var anyVisible = false;
    document.querySelectorAll('#po-list .po-card').forEach(function(card) {
      var match = !q || card.textContent.toLowerCase().indexOf(q) >= 0;
      card.style.display = match ? '' : 'none';
      if (match) anyVisible = true;
    });
    document.getElementById('po-no-result')
      .classList.toggle('visible', !!q && !anyVisible);
  }

  document.getElementById('stock-search').addEventListener('input', filterStock);
  document.getElementById('po-search').addEventListener('input', filterPo);
</script>
</body>
</html>
