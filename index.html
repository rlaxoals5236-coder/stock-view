<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1e293b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="재고">
<meta name="application-name" content="재고 현황">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<title>재고 현황</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic",
                 "맑은 고딕", sans-serif;
    background: #f1f5f9;
    color: #1e293b;
    -webkit-text-size-adjust: 100%;
  }
  header {
    background: #1e293b;
    color: #f8fafc;
    padding: 16px 20px;
    padding-top: max(16px, env(safe-area-inset-top));
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { margin: 0; font-size: 1.2rem; }
  header .ts { font-size: 0.8rem; opacity: 0.7; margin-top: 4px; }
  nav.top-tabs {
    display: flex;
    background: #334155;
    position: sticky;
    top: 62px;
    z-index: 9;
  }
  nav.top-tabs button {
    flex: 1;
    background: none;
    border: none;
    color: #cbd5e1;
    padding: 14px 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 3px solid transparent;
  }
  nav.top-tabs button.active {
    color: #f8fafc;
    border-bottom-color: #60a5fa;
  }
  nav.sub-tabs {
    display: flex;
    background: #e2e8f0;
    position: sticky;
    top: 110px;
    z-index: 8;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  nav.sub-tabs button {
    flex: 1;
    background: none;
    border: none;
    color: #64748b;
    padding: 10px 6px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
  }
  nav.sub-tabs button.active {
    background: #60a5fa;
    color: white;
  }
  main { padding: 16px; max-width: 960px; margin: 0 auto; }
  main > section { display: none; }
  main > section.active { display: block; }
  .stock-pane { display: none; }
  .stock-pane.active { display: block; }
  .search-box {
    width: 100%;
    padding: 12px 14px;
    font-size: 1rem;
    border: 2px solid #cbd5e1;
    border-radius: 8px;
    margin-bottom: 10px;
    background: white;
    -webkit-appearance: none;
    appearance: none;
  }
  .search-box:focus { outline: none; border-color: #60a5fa; }
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .filter-row .dd {
    flex: 1;
    min-width: 0;
    padding: 10px 12px;
    font-size: 0.95rem;
    border: 2px solid #cbd5e1;
    border-radius: 8px;
    background: white;
    color: #1e293b;
    -webkit-appearance: none;
    appearance: none;
  }
  .filter-row .dd:focus { outline: none; border-color: #60a5fa; }
  .no-result {
    padding: 24px;
    text-align: center;
    color: #94a3b8;
    background: white;
    border-radius: 8px;
    display: none;
    margin-top: 8px;
  }
  .no-result.visible { display: block; }
  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    font-size: 0.9rem;
  }
  th, td {
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid #e2e8f0;
  }
  th {
    background: #e2e8f0;
    font-weight: 600;
    font-size: 0.85rem;
    color: #475569;
  }
  tr:last-child td { border-bottom: none; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .empty {
    padding: 20px;
    text-align: center;
    color: #94a3b8;
    background: white;
    border-radius: 8px;
  }
  .po-card {
    background: white;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 12px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .po-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid #e2e8f0;
  }
  .po-customer { font-weight: 700; font-size: 1rem; }
  .po-date { color: #64748b; font-size: 0.85rem; }
  .po-memo { color: #64748b; font-size: 0.8rem; margin-top: 4px; }
  .po-line {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 0.9rem;
  }
  .po-line.shipped { color: #94a3b8; text-decoration: line-through; }
  .po-line .badge {
    display: inline-block;
    font-size: 0.7rem;
    padding: 1px 6px;
    border-radius: 10px;
    margin-left: 6px;
    background: #dcfce7;
    color: #166534;
  }
  @media (max-width: 600px) {
    nav.top-tabs { top: 62px; }
    nav.sub-tabs { top: 110px; }
    th, td { padding: 8px 6px; font-size: 0.85rem; }
    h1 { font-size: 1.05rem; }
    .filter-row .dd { padding: 9px 10px; font-size: 0.9rem; }
  }
</style>
</head>
<body>
<header>
  <h1>재고 현황</h1>
  <div class="ts">마지막 업데이트: 2026-04-15 18:01:24</div>
</header>
<nav class="top-tabs">
  <button class="tab-btn active" data-tab="stock">재고</button>
  <button class="tab-btn" data-tab="po">발주서</button>
</nav>
<main>
  <section id="stock" class="active">
    <nav class="sub-tabs">
      <button class="sub-tab-btn active" data-pane="fg">완제품</button>
      <button class="sub-tab-btn" data-pane="sf">반제품</button>
      <button class="sub-tab-btn" data-pane="wip">공정품</button>
      <button class="sub-tab-btn" data-pane="coil">코일</button>
    </nav>

    <div class="stock-pane active" data-pane="fg">
      <input type="search" class="search-box"
             placeholder="품목명 부분검색…" autocomplete="off">
      <div class="filter-row">
        <select class="dd name-dd"><option value="">전체</option></select>
        <select class="dd color-dd"><option value="">전체</option><option value="검정매트">검정매트</option><option value="백색">백색</option></select>
      </div>
      <div class="empty">데이터 없음</div>
      <div class="no-result">검색 결과 없음</div>
    </div>

    <div class="stock-pane" data-pane="sf">
      <input type="search" class="search-box"
             placeholder="품목명 부분검색…" autocomplete="off">
      <div class="filter-row">
        <select class="dd name-dd"><option value="">전체</option></select>
        <select class="dd color-dd"><option value="">전체</option><option value="검정매트">검정매트</option><option value="백색">백색</option></select>
      </div>
      <div class="empty">데이터 없음</div>
      <div class="no-result">검색 결과 없음</div>
    </div>

    <div class="stock-pane" data-pane="wip">
      <input type="search" class="search-box"
             placeholder="품목명 부분검색…" autocomplete="off">
      <div class="filter-row">
        <select class="dd name-dd"><option value="">전체</option></select>
        <select class="dd color-dd"><option value="">전체</option><option value="검정매트">검정매트</option><option value="백색">백색</option></select>
      </div>
      <div class="empty">데이터 없음</div>
      <div class="no-result">검색 결과 없음</div>
    </div>

    <div class="stock-pane" data-pane="coil">
      <div class="filter-row">
        <select class="dd width-dd"><option value="">전체</option></select>
        <select class="dd color-dd"><option value="">전체</option><option value="검정매트">검정매트</option><option value="백색">백색</option></select>
      </div>
      <div class="empty">데이터 없음</div>
      <div class="no-result">검색 결과 없음</div>
    </div>
  </section>
  <section id="po">
    <input type="search" class="search-box" id="po-search"
           placeholder="업체 / 품목 / 색상 / 메모 검색…" autocomplete="off">
    <div id="po-list"><div class="empty">발주서 없음</div></div>
    <div class="no-result" id="po-no-result">검색 결과 없음</div>
  </section>
</main>
<script>
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var tab = btn.getAttribute('data-tab');
      document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b === btn);
      });
      document.querySelectorAll('main > section').forEach(function(s) {
        s.classList.toggle('active', s.id === tab);
      });
    });
  });

  document.querySelectorAll('.sub-tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var pane = btn.getAttribute('data-pane');
      document.querySelectorAll('.sub-tab-btn').forEach(function(b) {
        b.classList.toggle('active', b === btn);
      });
      document.querySelectorAll('.stock-pane').forEach(function(p) {
        p.classList.toggle('active', p.getAttribute('data-pane') === pane);
      });
    });
  });

  function filterStagePane(pane) {
    var search = pane.querySelector('.search-box');
    var nameDd = pane.querySelector('.name-dd');
    var colorDd = pane.querySelector('.color-dd');
    var q = search ? search.value.trim().toLowerCase() : '';
    var nameVal = nameDd ? nameDd.value : '';
    var colorVal = colorDd ? colorDd.value : '';
    var rows = pane.querySelectorAll('tbody tr');
    var visible = 0;
    rows.forEach(function(tr) {
      var name = tr.getAttribute('data-name') || '';
      var color = tr.getAttribute('data-color') || '';
      var ok = true;
      if (q && name.toLowerCase().indexOf(q) < 0) ok = false;
      if (nameVal && name !== nameVal) ok = false;
      if (colorVal && color !== colorVal) ok = false;
      tr.style.display = ok ? '' : 'none';
      if (ok) visible++;
    });
    var nores = pane.querySelector('.no-result');
    if (nores) nores.classList.toggle('visible', rows.length > 0 && visible === 0);
  }

  function filterCoilPane(pane) {
    var widthDd = pane.querySelector('.width-dd');
    var colorDd = pane.querySelector('.color-dd');
    var widthVal = widthDd ? widthDd.value : '';
    var colorVal = colorDd ? colorDd.value : '';
    var rows = pane.querySelectorAll('tbody tr');
    var visible = 0;
    rows.forEach(function(tr) {
      var width = tr.getAttribute('data-width') || '';
      var color = tr.getAttribute('data-color') || '';
      var ok = true;
      if (widthVal && width !== widthVal) ok = false;
      if (colorVal && color !== colorVal) ok = false;
      tr.style.display = ok ? '' : 'none';
      if (ok) visible++;
    });
    var nores = pane.querySelector('.no-result');
    if (nores) nores.classList.toggle('visible', rows.length > 0 && visible === 0);
  }

  document.querySelectorAll('.stock-pane').forEach(function(pane) {
    var isCoil = pane.getAttribute('data-pane') === 'coil';
    var fn = isCoil ? function() { filterCoilPane(pane); }
                    : function() { filterStagePane(pane); };
    var search = pane.querySelector('.search-box');
    if (search) search.addEventListener('input', fn);
    pane.querySelectorAll('.dd').forEach(function(dd) {
      dd.addEventListener('change', fn);
    });
  });

  function filterPo() {
    var q = document.getElementById('po-search').value.trim().toLowerCase();
    var anyVisible = false;
    document.querySelectorAll('#po-list .po-card').forEach(function(card) {
      var match = !q || card.textContent.toLowerCase().indexOf(q) >= 0;
      card.style.display = match ? '' : 'none';
      if (match) anyVisible = true;
    });
    document.getElementById('po-no-result')
      .classList.toggle('visible', !!q && !anyVisible);
  }

  document.getElementById('po-search').addEventListener('input', filterPo);
</script>
</body>
</html>
