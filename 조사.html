<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e293b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="재고조사">
<title>재고조사</title>
<style>
  :root {
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --primary: #3b82f6;
    --gray: #f1f5f9;
    --amber: #fef3c7;
    --amber-border: #f59e0b;
    --green: #dcfce7;
    --green-border: #22c55e;
    --red: #fee2e2;
    --red-border: #ef4444;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "맑은 고딕", sans-serif;
    -webkit-text-size-adjust: 100%;
  }
  button, input { font-family: inherit; font-size: 1rem; }
  button { border: none; background: none; cursor: pointer; }
  input[type="text"], input[type="number"] {
    -webkit-appearance: none;
    appearance: none;
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    background: white;
    color: var(--text);
    outline: none;
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 20;
    background: #1e293b;
    color: #f8fafc;
    padding-top: env(safe-area-inset-top);
  }
  .topbar .title-row {
    padding: 12px 16px 8px;
  }
  .topbar h1 { margin: 0; font-size: 1.05rem; }
  .topbar .meta { font-size: 0.72rem; opacity: 0.7; margin-top: 2px; }
  .topbar .progress {
    background: white;
    color: var(--text);
    padding: 10px 16px 8px;
  }
  .topbar .counts {
    display: flex;
    gap: 10px;
    font-size: 0.82rem;
    font-weight: 600;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .topbar .counts .done { color: #16a34a; }
  .topbar .counts .inprog { color: #d97706; }
  .topbar .counts .unchecked { color: var(--muted); }
  .topbar .counts .total { color: var(--muted); margin-left: auto; }
  .bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #fbbf24, #22c55e);
    transition: width 0.2s;
  }
  .search-row {
    background: white;
    padding: 6px 12px 2px;
  }
  .search-wrap {
    position: relative;
  }
  .search-row input {
    width: 100%;
    padding: 10px 36px 10px 14px;
    font-size: 0.95rem;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    -webkit-appearance: none;
    appearance: none;
    outline: none;
  }
  .search-row input:focus {
    border-color: var(--primary);
    background: white;
  }
  .search-row .btn-clear-search {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    border-radius: 14px;
    background: var(--border);
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 700;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .search-row input:not(:placeholder-shown) + .btn-clear-search {
    display: flex;
  }
  .dd-row {
    display: flex;
    gap: 6px;
    padding: 6px 12px 2px;
    background: white;
  }
  .dd-row select {
    flex: 1;
    min-width: 0;
    padding: 9px 28px 9px 12px;
    font-size: 0.9rem;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 6'><path fill='%2364748b' d='M0 0l5 6 5-6z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 10px center;
    background-size: 10px 6px;
  }
  .dd-row select:focus {
    border-color: var(--primary);
    background-color: white;
  }
  .add-item-row {
    display: none;
    gap: 6px;
    padding: 6px 12px 10px;
    background: white;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .add-item-row.show { display: flex; }
  .add-item-row input {
    flex: 1 1 40%;
    min-width: 100px;
    font-size: 0.95rem;
  }
  .add-item-row button {
    padding: 10px 16px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.9rem;
  }
  .btn-new-confirm { background: var(--primary); color: white; }
  .btn-new-cancel { background: var(--border); color: var(--text); }

  .filters {
    display: flex;
    gap: 6px;
    padding: 8px 16px 10px;
    background: white;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filters button {
    padding: 8px 14px;
    border-radius: 20px;
    background: var(--bg);
    color: var(--muted);
    font-size: 0.82rem;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .filters button.active {
    background: var(--primary);
    color: white;
  }
  .filters .btn-add-item {
    background: #dcfce7;
    color: #166534;
    border: 1px solid #22c55e;
  }
  .filters .btn-add-item.active {
    background: #22c55e;
    color: white;
    border-color: #22c55e;
  }
  .filters .read-toggle {
    background: #fef3c7;
    color: #92400e;
    border: 1px solid #fbbf24;
    margin-left: 4px;
  }
  .filters .read-toggle.active {
    background: #f59e0b;
    color: white;
    border-color: #f59e0b;
  }

  /* === 읽기 모드 === */
  body.read-mode .row {
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
    column-gap: 12px;
    row-gap: 0;
    padding: 10px 14px;
    margin-bottom: 6px;
  }
  body.read-mode .row .head {
    grid-column: 1;
    grid-row: 1;
    font-size: 0.97rem;
    margin: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  body.read-mode .row .ref {
    grid-column: 1;
    grid-row: 2;
    font-size: 0.72rem;
    margin: 0;
  }
  body.read-mode .row .total {
    grid-column: 2;
    grid-row: 1 / span 2;
    align-self: center;
    font-size: 1.35rem;
    text-align: right;
    min-width: 60px;
  }
  body.read-mode .row .total .label { display: none; }
  body.read-mode .row .breakdown,
  body.read-mode .row .add-row,
  body.read-mode .row .action-row {
    display: none;
  }
  /* 미체크 행은 읽기 모드에서 더 연하게 */
  body.read-mode .row[data-state="unchecked"] .total {
    color: var(--muted);
    font-weight: 500;
  }

  main { padding: 10px 12px 140px; }

  .row {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
    transition: background 0.15s, border-color 0.15s;
  }
  .row[data-state="unchecked"] { background: var(--card); border-color: var(--border); }
  .row[data-state="inprogress"] { background: var(--amber); border-color: var(--amber-border); }
  .row[data-state="done-match"] { background: var(--green); border-color: var(--green-border); }
  .row[data-state="done-mismatch"] { background: var(--red); border-color: var(--red-border); }

  .row .head {
    font-size: 1.08rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 2px;
  }
  .row .ref {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .row .total {
    font-size: 1.35rem;
    font-weight: 700;
    line-height: 1.2;
  }
  .row .total .label {
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 500;
    margin-right: 6px;
  }
  .row .breakdown {
    font-size: 0.74rem;
    color: var(--muted);
    margin: 2px 0 12px;
    min-height: 1em;
    word-break: break-all;
  }
  .row .add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  .row .add-row input {
    flex: 1;
    min-width: 0;
    font-size: 1rem;
  }
  .row .btn-add {
    background: var(--primary);
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    font-weight: 700;
    white-space: nowrap;
  }
  .row .action-row {
    display: flex;
    gap: 8px;
  }
  .row .btn-done {
    flex: 1;
    padding: 11px 14px;
    background: white;
    color: var(--text);
    border: 2px solid var(--border);
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.95rem;
  }
  .row[data-state="done-match"] .btn-done,
  .row[data-state="done-mismatch"] .btn-done {
    background: var(--text);
    color: white;
    border-color: var(--text);
  }
  .row .btn-clear {
    padding: 11px 14px;
    background: white;
    color: var(--muted);
    border: 2px solid var(--border);
    border-radius: 8px;
    font-weight: 600;
    font-size: 0.9rem;
  }

  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    display: flex;
    gap: 6px;
    z-index: 20;
  }
  .footer button {
    flex: 1;
    padding: 13px 6px;
    border-radius: 10px;
    font-size: 0.88rem;
    font-weight: 700;
  }
  .footer .btn-save { background: #e2e8f0; color: var(--text); }
  .footer .btn-batch { background: #f59e0b; color: white; }
  .footer .btn-export { background: #22c55e; color: white; }

  .empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
  }

  .toast {
    position: fixed;
    bottom: 110px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 12px 20px;
    border-radius: 20px;
    font-size: 0.88rem;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    max-width: 86vw;
    text-align: center;
  }
  .toast.show { opacity: 1; }

  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal.show { display: flex; }
  .modal-card {
    background: white;
    border-radius: 16px;
    padding: 18px;
    max-width: 520px;
    width: 100%;
    max-height: 86vh;
    display: flex;
    flex-direction: column;
  }
  .modal-card h2 { margin: 0 0 8px; font-size: 1.1rem; }
  .modal-card .info {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 10px;
    line-height: 1.4;
  }
  .modal-card textarea {
    width: 100%;
    flex: 1;
    min-height: 180px;
    padding: 10px;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 0.78rem;
    resize: none;
    margin-bottom: 12px;
    -webkit-appearance: none;
    appearance: none;
  }
  .modal-card .buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .modal-card .buttons button {
    flex: 1;
    min-width: 90px;
    padding: 12px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.92rem;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-secondary { background: var(--border); color: var(--text); }
</style>
</head>
<body>

<div class="topbar">
  <div class="title-row">
    <h1 id="page-title">재고조사</h1>
    <div class="meta" id="snapshot-meta">스냅샷 로딩중…</div>
  </div>
  <div class="progress">
    <div class="counts">
      <span class="done">완료 <strong id="count-done">0</strong></span>
      <span class="inprog">진행중 <strong id="count-inprog">0</strong></span>
      <span class="unchecked">미체크 <strong id="count-unchecked">0</strong></span>
      <span class="total">전체 <strong id="count-total">0</strong></span>
    </div>
    <div class="bar"><div class="bar-fill" id="bar-fill" style="width:0"></div></div>
  </div>
  <div class="search-row">
    <div class="search-wrap">
      <input type="search" id="search-input" placeholder="품목명 / 색상 검색…" autocomplete="off" autocapitalize="off">
      <button class="btn-clear-search" id="btn-clear-search" type="button">✕</button>
    </div>
  </div>
  <div class="dd-row">
    <select id="filter-name"><option value="">품목 전체</option></select>
    <select id="filter-color"><option value="">색상 전체</option></select>
  </div>
  <div class="add-item-row" id="add-item-row">
    <input type="text" id="new-name" placeholder="새 품목명" autocomplete="off" autocapitalize="off">
    <input type="text" id="new-color" placeholder="색상" autocomplete="off" autocapitalize="off">
    <button class="btn-new-confirm" id="btn-new-confirm" type="button">추가</button>
    <button class="btn-new-cancel" id="btn-new-cancel" type="button">취소</button>
  </div>
  <div class="filters">
    <button data-filter="all" class="active">전체</button>
    <button data-filter="unchecked">미체크</button>
    <button data-filter="inprogress">진행중</button>
    <button data-filter="done-mismatch">불일치</button>
    <button data-filter="done-match">일치</button>
    <button id="btn-add-item" class="btn-add-item" type="button">➕ 새 품목</button>
    <button id="btn-read-mode" class="read-toggle">📖 읽기</button>
  </div>
</div>

<main id="list"></main>

<div class="footer">
  <button class="btn-save" id="btn-save">💾 백업/복원</button>
  <button class="btn-batch" id="btn-batch">▶ 일괄완료</button>
  <button class="btn-export" id="btn-export">📋 결과복사</button>
</div>

<div class="toast" id="toast"></div>

<div class="modal" id="modal">
  <div class="modal-card">
    <h2 id="modal-title">제목</h2>
    <p class="info" id="modal-info"></p>
    <textarea id="modal-textarea" spellcheck="false" autocapitalize="off"></textarea>
    <div class="buttons" id="modal-buttons"></div>
  </div>

<script>
(function() {
  var RAW = JSON.parse(document.getElementById('data-json').textContent);
  var SNAPSHOT_ID = RAW.snapshot_id;
  var STORAGE_KEY = '재고조사_' + SNAPSHOT_ID;
  var CUSTOM_KEY = '재고조사_custom_' + SNAPSHOT_ID;
  var ITEMS = RAW.items.slice();

  // 사용자가 추가한 품목 로드 후 ITEMS 뒤에 붙임
  var customItems = [];
  try {
    var rawC = localStorage.getItem(CUSTOM_KEY);
    if (rawC) customItems = JSON.parse(rawC) || [];
  } catch (e) { customItems = []; }
  for (var ic = 0; ic < customItems.length; ic++) {
    ITEMS.push(customItems[ic]);
  }

  // state[idx] = { entries: [...], done: bool }
  var state = {};
  var currentFilter = 'all';
  var searchQuery = '';
  var filterName = '';
  var filterColor = '';

  function saveCustoms() {
    try { localStorage.setItem(CUSTOM_KEY, JSON.stringify(customItems)); }
    catch (e) { toast('커스텀 품목 저장 실패'); }
  }

  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) state = JSON.parse(raw) || {};
    } catch (e) {
      console.error('load failed', e);
    }
    // 다른 snapshot_id 데이터 감지
    var other = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k && k.indexOf('재고조사_') === 0 && k !== STORAGE_KEY) {
        other.push(k);
      }
    }
    if (other.length) {
      setTimeout(function() {
        if (confirm('이전 재고조사 진행사항(' + other.length + '개 버전)이 있습니다.\n\n삭제하고 새로 시작할까요?\n(취소하면 그대로 두고 시작)')) {
          other.forEach(function(k) { localStorage.removeItem(k); });
          toast('이전 진행사항 삭제됨');
        }
      }, 300);
    }
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {
      console.error('save failed', e);
      toast('저장 실패 (저장공간 부족?)');
    }
  }

  function getRowState(idx) {
    var s = state[idx];
    if (!s || (!s.entries.length && !s.done)) return 'unchecked';
    if (!s.done) return 'inprogress';
    var total = sum(s.entries);
    return total === ITEMS[idx].system ? 'done-match' : 'done-mismatch';
  }

  function sum(arr) {
    var t = 0;
    for (var i = 0; i < arr.length; i++) t += arr[i];
    return t;
  }

  function getTotal(idx) {
    var s = state[idx];
    return s ? sum(s.entries) : 0;
  }

  function getBreakdown(idx) {
    var s = state[idx];
    if (!s || !s.entries.length) return '';
    var e = s.entries;
    if (e.length <= 5) return '내역: ' + e.join(' + ');
    return '내역: ... 외 ' + (e.length - 5) + '개 + ' + e.slice(-5).join(' + ');
  }

  function fmtRef(item) {
    var r = '시스템 ' + item.system;
    if (item.feb !== null && item.feb !== undefined && item.feb !== '') {
      r += ' · 2월 ' + item.feb;
    }
    if (item.diff !== null && item.diff !== undefined && item.diff !== 0 && item.diff !== '') {
      r += ' · Δ' + (item.diff > 0 ? '+' : '') + item.diff;
    }
    if (item.status && item.status !== '변경') {
      r += ' · ' + item.status;
    }
    return r;
  }

  function escapeHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function renderRow(idx) {
    var item = ITEMS[idx];
    var rs = getRowState(idx);
    var total = getTotal(idx);
    var breakdown = getBreakdown(idx);
    var isDone = state[idx] && state[idx].done;
    var div = document.createElement('div');
    div.className = 'row';
    div.setAttribute('data-state', rs);
    div.setAttribute('data-idx', idx);
    div.innerHTML =
      '<div class="head">' + escapeHtml(item.name) + ' · ' + escapeHtml(item.color) + '</div>' +
      '<div class="ref">' + escapeHtml(fmtRef(item)) + '</div>' +
      '<div class="total"><span class="label">실제</span>' + total + '</div>' +
      '<div class="breakdown">' + escapeHtml(breakdown) + '</div>' +
      '<div class="add-row">' +
        '<input type="text" inputmode="numeric" pattern="[0-9]*" placeholder="수량 입력" class="in-add">' +
        '<button class="btn-add">+ 추가</button>' +
      '</div>' +
      '<div class="action-row">' +
        '<button class="btn-done">' + (isDone ? '✓ 완료됨' : '✓ 완료') + '</button>' +
        '<button class="btn-clear">↻ 지우기</button>' +
      '</div>';

    var input = div.querySelector('.in-add');
    div.querySelector('.btn-add').addEventListener('click', function() { addEntry(idx, input); });
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.keyCode === 13) {
        e.preventDefault();
        addEntry(idx, input);
      }
    });
    div.querySelector('.btn-done').addEventListener('click', function() { toggleDone(idx); });
    div.querySelector('.btn-clear').addEventListener('click', function() { clearRow(idx); });

    return div;
  }

  function addEntry(idx, input) {
    var raw = (input.value || '').trim();
    if (!raw) { toast('수량을 입력하세요'); return; }
    var n = parseInt(raw, 10);
    if (isNaN(n) || n < 0) { toast('숫자만 입력 가능'); return; }
    if (!state[idx]) state[idx] = { entries: [], done: false };
    state[idx].entries.push(n);
    // 입력 후 이미 완료 상태였다면 진행중으로 복귀
    state[idx].done = false;
    input.value = '';
    saveState();
    refreshRow(idx);
    updateProgress();
    input.focus();
  }

  function toggleDone(idx) {
    if (!state[idx]) state[idx] = { entries: [], done: false };
    state[idx].done = !state[idx].done;
    saveState();
    refreshRow(idx);
    updateProgress();
  }

  function clearRow(idx) {
    if (state[idx] && (state[idx].entries.length || state[idx].done)) {
      if (!confirm('이 행의 입력을 모두 지울까요?')) return;
    }
    delete state[idx];
    saveState();
    refreshRow(idx);
    updateProgress();
  }

  function refreshRow(idx) {
    var old = document.querySelector('.row[data-idx="' + idx + '"]');
    if (!old) return;
    var fresh = renderRow(idx);
    old.replaceWith(fresh);
    applyFilterOne(fresh);
  }

  function renderAll() {
    var list = document.getElementById('list');
    list.innerHTML = '';
    if (!ITEMS.length) {
      list.innerHTML = '<div class="empty">재고조사 항목이 없습니다.</div>';
      return;
    }
    for (var i = 0; i < ITEMS.length; i++) {
      var row = renderRow(i);
      applyFilterOne(row);
      list.appendChild(row);
    }
  }

  function applyFilterOne(row) {
    var rs = row.getAttribute('data-state');
    var ok;
    switch (currentFilter) {
      case 'unchecked':     ok = rs === 'unchecked'; break;
      case 'inprogress':    ok = rs === 'inprogress'; break;
      case 'done-mismatch': ok = rs === 'done-mismatch'; break;
      case 'done-match':    ok = rs === 'done-match'; break;
      default:              ok = true;
    }
    if (ok && (searchQuery || filterName || filterColor)) {
      var idx = parseInt(row.getAttribute('data-idx'), 10);
      var item = ITEMS[idx];
      if (searchQuery) {
        var hay = (item.name + ' ' + item.color).toLowerCase();
        if (hay.indexOf(searchQuery) < 0) ok = false;
      }
      if (ok && filterName && item.name !== filterName) ok = false;
      if (ok && filterColor && item.color !== filterColor) ok = false;
    }
    row.style.display = ok ? '' : 'none';
  }

  function populateDropdowns() {
    var names = {}, colors = {};
    for (var i = 0; i < ITEMS.length; i++) {
      names[ITEMS[i].name] = true;
      colors[ITEMS[i].color] = true;
    }
    var nameArr = Object.keys(names).sort(function(a, b) { return a.localeCompare(b, 'ko'); });
    var colorArr = Object.keys(colors).sort(function(a, b) { return a.localeCompare(b, 'ko'); });
    var ndd = document.getElementById('filter-name');
    var cdd = document.getElementById('filter-color');
    var prevN = ndd.value;
    var prevC = cdd.value;
    ndd.innerHTML = '<option value="">품목 전체 (' + nameArr.length + ')</option>';
    for (var j = 0; j < nameArr.length; j++) {
      var o = document.createElement('option');
      o.value = nameArr[j];
      o.textContent = nameArr[j];
      ndd.appendChild(o);
    }
    cdd.innerHTML = '<option value="">색상 전체 (' + colorArr.length + ')</option>';
    for (var k = 0; k < colorArr.length; k++) {
      var oc = document.createElement('option');
      oc.value = colorArr[k];
      oc.textContent = colorArr[k];
      cdd.appendChild(oc);
    }
    ndd.value = prevN;
    cdd.value = prevC;
  }

  function toggleAddItemForm() {
    var form = document.getElementById('add-item-row');
    var btn = document.getElementById('btn-add-item');
    var showing = form.classList.toggle('show');
    btn.classList.toggle('active', showing);
    if (showing) {
      document.getElementById('new-name').focus();
    } else {
      document.getElementById('new-name').value = '';
      document.getElementById('new-color').value = '';
    }
  }

  function confirmAddItem() {
    var nameI = document.getElementById('new-name');
    var colorI = document.getElementById('new-color');
    var name = (nameI.value || '').trim();
    var color = (colorI.value || '').trim();
    if (!name || !color) { toast('품목명과 색상을 모두 입력하세요'); return; }
    for (var i = 0; i < ITEMS.length; i++) {
      if (ITEMS[i].name === name && ITEMS[i].color === color) {
        toast('이미 있는 품목입니다'); return;
      }
    }
    var newIt = { name: name, color: color, system: 0, custom: true };
    customItems.push(newIt);
    ITEMS.push(newIt);
    saveCustoms();
    populateDropdowns();
    var idx = ITEMS.length - 1;
    var row = renderRow(idx);
    applyFilterOne(row);
    document.getElementById('list').appendChild(row);
    updateProgress();
    nameI.value = '';
    colorI.value = '';
    nameI.focus();
    toast('추가됨: ' + name + ' · ' + color);
  }

  function applyFilterAll() {
    var rows = document.querySelectorAll('.row');
    for (var i = 0; i < rows.length; i++) applyFilterOne(rows[i]);
  }

  function updateProgress() {
    var done = 0, inprog = 0, unchecked = 0;
    for (var i = 0; i < ITEMS.length; i++) {
      var rs = getRowState(i);
      if (rs === 'unchecked') unchecked++;
      else if (rs === 'inprogress') inprog++;
      else done++;
    }
    document.getElementById('count-done').textContent = done;
    document.getElementById('count-inprog').textContent = inprog;
    document.getElementById('count-unchecked').textContent = unchecked;
    var totalEl = document.getElementById('count-total');
    if (totalEl) totalEl.textContent = ITEMS.length;
    var pct = ITEMS.length ? (done / ITEMS.length * 100) : 0;
    document.getElementById('bar-fill').style.width = pct.toFixed(1) + '%';
  }

  function batchDone() {
    var n = 0;
    for (var i = 0; i < ITEMS.length; i++) {
      if (state[i] && state[i].entries.length && !state[i].done) {
        state[i].done = true;
        n++;
      }
    }
    if (!n) { toast('진행중인 행이 없습니다'); return; }
    if (!confirm('진행중 ' + n + '개 행을 모두 완료 처리할까요?')) return;
    saveState();
    renderAll();
    updateProgress();
    toast(n + '개 완료 처리됨');
  }

  function buildResult() {
    var results = [];
    var done = 0, inprog = 0, unchecked = 0;
    for (var i = 0; i < ITEMS.length; i++) {
      var item = ITEMS[i];
      var s = state[i] || { entries: [], done: false };
      var rs = getRowState(i);
      if (rs === 'unchecked') unchecked++;
      else if (rs === 'inprogress') inprog++;
      else done++;
      var total = sum(s.entries);
      results.push({
        name: item.name,
        color: item.color,
        system: item.system,
        entries: s.entries.slice(),
        total: total,
        status: rs,
        match: s.done && total === item.system
      });
    }
    return {
      snapshot_id: SNAPSHOT_ID,
      exported_at: new Date().toISOString(),
      total: ITEMS.length,
      done: done,
      inprogress: inprog,
      unchecked: unchecked,
      results: results
    };
  }

  function copyToClipboard(text) {
    return new Promise(function(resolve) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(
          function() { resolve(true); },
          function() { resolve(fallback()); }
        );
      } else {
        resolve(fallback());
      }
      function fallback() {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        var ok = false;
        try { ok = document.execCommand('copy'); } catch (e) {}
        document.body.removeChild(ta);
        return ok;
      }
    });
  }

  function openModal(title, info, text, buttons) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-info').textContent = info;
    var ta = document.getElementById('modal-textarea');
    ta.value = text;
    var cont = document.getElementById('modal-buttons');
    cont.innerHTML = '';
    buttons.forEach(function(b) {
      var el = document.createElement('button');
      el.textContent = b.label;
      el.className = b.primary ? 'btn-primary' : 'btn-secondary';
      el.addEventListener('click', function() {
        var shouldClose = b.onClick(ta.value);
        if (shouldClose !== false) closeModal();
      });
      cont.appendChild(el);
    });
    document.getElementById('modal').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('show');
  }

  function onExport() {
    var result = buildResult();
    var warn = [];
    if (result.unchecked > 0) warn.push('미체크 ' + result.unchecked + '개');
    if (result.inprogress > 0) warn.push('진행중 ' + result.inprogress + '개');
    if (warn.length) {
      if (!confirm('⚠️ 아직 완료 안 된 항목이 있습니다:\n' + warn.join(', ') + '\n\n그래도 결과를 제출할까요?')) {
        return;
      }
    }
    var json = JSON.stringify(result);
    openModal(
      '결과 복사',
      '아래 JSON 을 카톡이나 메일로 집 PC 에 보내세요. 복사 버튼이 안 먹으면 텍스트를 직접 드래그해서 복사하시면 됩니다.',
      json,
      [
        {
          label: '📋 복사',
          primary: true,
          onClick: function(text) {
            copyToClipboard(text).then(function(ok) {
              toast(ok ? '복사 완료! 카톡/메일로 전송하세요' : '복사 실패. 직접 선택해서 복사하세요');
            });
            return false;
          }
        },
        { label: '닫기', primary: false, onClick: function() {} }
      ]
    );
  }

  function onSaveRestore() {
    var result = buildResult();
    var json = JSON.stringify(result);
    openModal(
      '백업 / 복원',
      '위쪽 복사 = 현재 진행사항 백업. 붙여넣고 아래 복원 = 이전 백업으로 되돌리기.',
      json,
      [
        {
          label: '📋 현재 복사',
          primary: true,
          onClick: function(text) {
            copyToClipboard(text).then(function(ok) {
              toast(ok ? '백업 복사 완료. 메모 앱에 붙여넣으세요' : '복사 실패');
            });
            return false;
          }
        },
        {
          label: '📥 복원',
          primary: false,
          onClick: function(text) {
            if (!text || !text.trim()) { toast('내용이 비어있습니다'); return false; }
            try {
              var parsed = JSON.parse(text);
              if (parsed.snapshot_id && parsed.snapshot_id !== SNAPSHOT_ID) {
                if (!confirm('저장된 스냅샷 ID 가 다릅니다.\n(' + parsed.snapshot_id + ' → ' + SNAPSHOT_ID + ')\n그래도 복원할까요?')) return false;
              }
              state = {};
              var restored = 0;
              var addedCustoms = 0;
              (parsed.results || []).forEach(function(r) {
                var found = -1;
                for (var i = 0; i < ITEMS.length; i++) {
                  if (ITEMS[i].name === r.name && ITEMS[i].color === r.color) {
                    found = i;
                    break;
                  }
                }
                if (found === -1) {
                  // 백업에만 있고 현재 목록엔 없는 품목 = 이전에 추가한 커스텀 품목
                  var newIt = { name: r.name, color: r.color, system: r.system || 0, custom: true };
                  customItems.push(newIt);
                  ITEMS.push(newIt);
                  found = ITEMS.length - 1;
                  addedCustoms++;
                }
                state[found] = {
                  entries: (r.entries || []).slice(),
                  done: !!(r.status && r.status.indexOf('done') === 0)
                };
                restored++;
              });
              if (addedCustoms) saveCustoms();
              saveState();
              populateDropdowns();
              renderAll();
              updateProgress();
              var msg = '복원 완료: ' + restored + '개';
              if (addedCustoms) msg += ' (커스텀 ' + addedCustoms + '개 추가)';
              toast(msg);
              return true;
            } catch (e) {
              toast('JSON 파싱 실패: ' + e.message);
              return false;
            }
          }
        },
        { label: '닫기', primary: false, onClick: function() {} }
      ]
    );
  }

  function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toast._tid);
    toast._tid = setTimeout(function() { t.classList.remove('show'); }, 2400);
  }

  // filter buttons (data-filter 속성 있는 것만)
  var filterBtns = document.querySelectorAll('.filters button[data-filter]');
  for (var i = 0; i < filterBtns.length; i++) {
    (function(btn) {
      btn.addEventListener('click', function() {
        currentFilter = btn.getAttribute('data-filter');
        for (var j = 0; j < filterBtns.length; j++) {
          filterBtns[j].classList.toggle('active', filterBtns[j] === btn);
        }
        applyFilterAll();
      });
    })(filterBtns[i]);
  }

  // 드롭다운 필터
  document.getElementById('filter-name').addEventListener('change', function() {
    filterName = this.value;
    applyFilterAll();
  });
  document.getElementById('filter-color').addEventListener('change', function() {
    filterColor = this.value;
    applyFilterAll();
  });

  // 새 품목 추가
  document.getElementById('btn-add-item').addEventListener('click', toggleAddItemForm);
  document.getElementById('btn-new-confirm').addEventListener('click', confirmAddItem);
  document.getElementById('btn-new-cancel').addEventListener('click', toggleAddItemForm);
  document.getElementById('new-color').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.keyCode === 13) {
      e.preventDefault();
      confirmAddItem();
    }
  });
  document.getElementById('new-name').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.keyCode === 13) {
      e.preventDefault();
      document.getElementById('new-color').focus();
    }
  });

  document.getElementById('btn-export').addEventListener('click', onExport);
  document.getElementById('btn-save').addEventListener('click', onSaveRestore);
  document.getElementById('btn-batch').addEventListener('click', batchDone);

  var searchInput = document.getElementById('search-input');
  searchInput.addEventListener('input', function() {
    searchQuery = (searchInput.value || '').trim().toLowerCase();
    applyFilterAll();
  });
  document.getElementById('btn-clear-search').addEventListener('click', function() {
    searchInput.value = '';
    searchQuery = '';
    applyFilterAll();
    searchInput.focus();
  });

  // 읽기 모드
  var READ_MODE_KEY = '재고조사_read_mode';
  var readModeBtn = document.getElementById('btn-read-mode');
  function setReadMode(on) {
    document.body.classList.toggle('read-mode', on);
    readModeBtn.classList.toggle('active', on);
    readModeBtn.textContent = on ? '✏️ 입력' : '📖 읽기';
    try { localStorage.setItem(READ_MODE_KEY, on ? '1' : '0'); } catch (e) {}
  }
  readModeBtn.addEventListener('click', function() {
    setReadMode(!document.body.classList.contains('read-mode'));
  });
  try {
    if (localStorage.getItem(READ_MODE_KEY) === '1') setReadMode(true);
  } catch (e) {}

  // 모달 배경 탭하면 닫기
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // 스냅샷 메타 표시
  (function() {
    var metaEl = document.getElementById('snapshot-meta');
    if (!metaEl) return;
    var s = SNAPSHOT_ID || '';
    var formatted = s;
    if (/^\d{8}_\d{6}$/.test(s)) {
      formatted =
        s.substr(0, 4) + '-' + s.substr(4, 2) + '-' + s.substr(6, 2) +
        ' ' + s.substr(9, 2) + ':' + s.substr(11, 2);
    }
    metaEl.innerHTML = '스냅샷 ' + formatted + ' · <span>' + s + '</span>';
  })();

  loadState();
  populateDropdowns();
  renderAll();
  updateProgress();
})();
</script>
</body>
</html>
